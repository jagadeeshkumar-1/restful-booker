name: API Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      test_group:
        description: 'Test group to run'
        required: false
        default: 'Smoke'
        type: choice
        options:
          - Smoke
          - Regression
          - ExistingDefect
          - All

permissions:
  contents: read
  checks: write
  actions: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Resolve test group
        id: group
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "group=Smoke" >> "$GITHUB_OUTPUT"
            echo "PR build — forcing group: Smoke"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "group=${{ inputs.test_group }}" >> "$GITHUB_OUTPUT"
            echo "Manual trigger — group: ${{ inputs.test_group }}"
          else
            echo "group=Smoke" >> "$GITHUB_OUTPUT"
            echo "Push build — running Smoke"
          fi
      - name: Run tests
        continue-on-error: true
        run: |
          GROUP="${{ steps.group.outputs.group }}"
          if [ "$GROUP" = "All" ]; then
            mvn clean test -B --no-transfer-progress
          else
            mvn clean test -Dgroups="$GROUP" -B --no-transfer-progress
          fi
      - name: Publish test results
        uses: dorny/test-reporter@v2
        if: always()
        with:
          name: TestNG Results
          path: target/surefire-reports/junitreports/*.xml
          reporter: java-junit

      - name: Install Allure CLI
        if: always()
        run: |
          curl -sL https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz | tar -xz
          echo "$PWD/allure-2.27.0/bin" >> "$GITHUB_PATH"

      - name: Generate Allure report (single file)
        if: always()
        run: allure generate target/allure-results --single-file -o allure-report --clean

      - name: Upload Allure report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30